<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN SPORTS | Initiate</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#DC2626',
                            dark: 'var(--bg-primary)',
                            gray: 'var(--bg-secondary)',
                            card: 'var(--bg-card)',
                            text: 'var(--text-primary)',
                            muted: 'var(--text-secondary)',
                            border: 'var(--border-color)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Oswald', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Immediate theme and direction initialization
        (function() {
            const savedTheme = localStorage.getItem('siteTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const savedDir = localStorage.getItem('siteDirection') || 'ltr';
            document.documentElement.setAttribute('dir', savedDir);
            document.documentElement.classList.add(savedDir);
        })();

        // Global functions for theme and direction
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('siteTheme', theme);
            document.dispatchEvent(new CustomEvent('themechange', { detail: { theme } }));
            updateToggles();
        };

        window.setDirection = function(dir) {
            document.documentElement.setAttribute('dir', dir);
            document.documentElement.classList.remove('ltr', 'rtl');
            document.documentElement.classList.add(dir);
            localStorage.setItem('siteDirection', dir);
            document.dispatchEvent(new CustomEvent('directionchange', { detail: { direction: dir } }));
            updateToggles();
        };

        function updateToggles() {
            const theme = document.documentElement.getAttribute('data-theme');
            const dir = document.documentElement.getAttribute('dir') || 'ltr';
            
            document.querySelectorAll('#theme-toggle, #theme-toggle-mobile').forEach(btn => {
                const icon = btn.querySelector('ion-icon');
                if (icon) icon.setAttribute('name', theme === 'dark' ? 'moon-outline' : 'sunny-outline');
            });
            
            document.querySelectorAll('#rtl-toggle').forEach(btn => {
                const icon = btn.querySelector('ion-icon');
                if (icon) icon.setAttribute('name', dir === 'rtl' ? 'language-outline' : 'language-outline');
            });
        }

        // Global delegated click listener
        document.addEventListener('click', function(e) {
            const themeBtn = e.target.closest('#theme-toggle, #theme-toggle-mobile');
            if (themeBtn) {
                e.preventDefault();
                const current = document.documentElement.getAttribute('data-theme');
                window.setTheme(current === 'dark' ? 'light' : 'dark');
            }
            
            const rtlBtn = e.target.closest('#rtl-toggle');
            if (rtlBtn) {
                e.preventDefault();
                const current = document.documentElement.getAttribute('dir') || 'ltr';
                window.setDirection(current === 'ltr' ? 'rtl' : 'ltr');
            }
        });

        // Sync toggles on load
        window.addEventListener('DOMContentLoaded', updateToggles);
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Oswald:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body class="bg-brand-dark text-brand-text font-sans antialiased overflow-hidden h-screen">

    <div class="h-full w-full flex">

        <!-- Left Side: Visual (Hidden on Mobile) -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-brand-gray order-2 auth-image-panel">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?q=80&w=2069&auto=format&fit=crop"
                    alt="Athlete Training"
                    class="w-full h-full object-cover grayscale opacity-60 scale-105 hover:scale-100 transition-transform duration-[20s] ease-linear">
            </div>
            <!-- Overlay -->
            <div class="absolute inset-0 bg-gradient-to-b from-black via-transparent to-black/80"></div>

            <!-- Branding -->
            <div class="relative z-10 w-full h-full flex flex-col justify-end items-end p-12 text-right auth-panel-text">
                <a href="index.html"
                    class="flex items-center gap-2 absolute top-12 right-12 rtl:right-auto rtl:left-12">
                    <span class="font-heading text-2xl font-bold tracking-wider">TITAN<span
                            class="text-brand-red">SPORTS</span></span>
                    <ion-icon name="flash" class="text-3xl text-brand-red"></ion-icon>
                </a>

                <div class="animate-slide-up">
                    <h2 class="font-heading text-6xl font-bold uppercase leading-tight mb-4 text-white">Rise <br><span
                            class="text-brand-red">Above.</span></h2>
                    <p class="text-gray-400 max-w-md ml-auto">"Strength does not come from winning. Your struggles
                        develop your strengths." – Arnold Schwarzenegger</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Form (Actually Left in HTML for Order) -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-brand-dark relative order-1 auth-form-panel">

            <!-- Mobile Logo -->
            <div class="absolute top-8 left-8 lg:hidden rtl:left-auto rtl:right-8">
                <a href="index.html" class="flex items-center gap-2">
                    <ion-icon name="flash" class="text-2xl text-brand-red"></ion-icon>
                    <span class="font-heading text-xl font-bold tracking-wider">TITAN<span
                            class="text-brand-red">SPORTS</span></span>
                </a>
            </div>

            <!-- Top Right Actions: RTL Toggle + Login Link -->
            <div class="absolute top-8 right-8 rtl:right-auto rtl:left-8 flex items-center gap-3 sm:gap-4">
                <!-- Theme Toggle -->
                <button id="theme-toggle" 
                    class="p-2 text-brand-muted hover:text-brand-text transition-colors rounded-full hover:bg-black/5" 
                    title="Toggle Theme">
                    <ion-icon name="moon-outline" class="text-lg sm:text-xl"></ion-icon>
                </button>
                <!-- RTL Toggle -->
                <button id="rtl-toggle" 
                    class="p-2 text-brand-muted hover:text-brand-text transition-colors rounded-full hover:bg-black/5" 
                    title="Switch Language Direction">
                    <ion-icon name="language-outline" class="text-lg sm:text-xl"></ion-icon>
                </button>
            </div>

            <div class="w-full max-w-sm animate-fade-in relative mt-12 lg:mt-0">
                <!-- Header -->
                <div class="mb-10 text-center">
                    <h3 class="text-brand-red text-xs font-bold uppercase tracking-[0.2em] mb-2">New Account</h3>
                    <h1 class="font-heading text-4xl font-bold uppercase">Join The Elite</h1>
                </div>

                <!-- Form -->
                <form class="space-y-6">

                    <!-- Name -->
                    <div class="group relative">
                        <input type="text" id="name" required
                            class="peer w-full bg-transparent border-b border-brand-border py-3 text-lg text-brand-text focus:outline-none focus:border-brand-red transition-all placeholder-transparent">
                        <label for="name"
                            class="absolute left-0 top-3 text-brand-muted text-sm uppercase tracking-widest transition-all rtl:left-auto rtl:right-0 
                                      peer-placeholder-shown:text-base peer-placeholder-shown:text-brand-muted peer-placeholder-shown:top-3 
                                      peer-focus:-top-4 peer-focus:text-xs peer-focus:text-brand-red peer-valid:-top-4 peer-valid:text-xs">
                            Full Name
                        </label>
                    </div>

                    <!-- Email -->
                    <div class="group relative">
                        <input type="email" id="email" required
                            class="peer w-full bg-transparent border-b border-brand-border py-3 text-lg text-brand-text focus:outline-none focus:border-brand-red transition-all placeholder-transparent">
                        <label for="email"
                            class="absolute left-0 top-3 text-brand-muted text-sm uppercase tracking-widest transition-all rtl:left-auto rtl:right-0 
                                      peer-placeholder-shown:text-base peer-placeholder-shown:text-brand-muted peer-placeholder-shown:top-3 
                                      peer-focus:-top-4 peer-focus:text-xs peer-focus:text-brand-red peer-valid:-top-4 peer-valid:text-xs">
                            Email Address
                        </label>
                    </div>

                    <!-- Password -->
                    <div class="group relative">
                        <input type="password" id="password" required
                            class="peer w-full bg-transparent border-b border-brand-border py-3 text-lg text-brand-text focus:outline-none focus:border-brand-red transition-all placeholder-transparent pr-10 rtl:pr-0 rtl:pl-10">
                        <label for="password"
                            class="absolute left-0 top-3 text-brand-muted text-sm uppercase tracking-widest transition-all rtl:left-auto rtl:right-0 
                                      peer-placeholder-shown:text-base peer-placeholder-shown:text-brand-muted peer-placeholder-shown:top-3 
                                      peer-focus:-top-4 peer-focus:text-xs peer-focus:text-brand-red peer-valid:-top-4 peer-valid:text-xs">
                            Password
                        </label>
                        <button type="button" id="toggle-password"
                            class="absolute right-0 top-3 text-brand-muted hover:text-brand-text transition-colors rtl:right-auto rtl:left-0"
                            title="Toggle Password Visibility">
                            <ion-icon name="eye-outline" class="text-xl"></ion-icon>
                        </button>
                    </div>

                    <!-- Terms -->
                    <div class="flex items-center gap-3 pt-2">
                        <div class="relative flex items-center">
                            <input type="checkbox" id="terms"
                                class="peer h-5 w-5 cursor-pointer appearance-none rounded border border-brand-border bg-transparent checked:border-brand-red checked:bg-brand-red transition-all">
                            <ion-icon name="checkmark"
                                class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-white text-sm opacity-0 peer-checked:opacity-100 pointer-events-none"></ion-icon>
                        </div>
                        <label for="terms" class="text-xs text-brand-muted">I agree to the <a href="#"
                                class="text-brand-text hover:underline">Terms</a> & <a href="#"
                                class="text-brand-text hover:underline">Privacy Policy</a></label>
                    </div>

                    <!-- Submit -->
                    <button type="button" onclick="window.location.href='user-dashboard.html'"
                        class="w-full bg-brand-red text-white font-bold h-14 uppercase tracking-[0.15em] hover:bg-brand-text hover:text-brand-dark transition-all duration-300 shadow-lg shadow-brand-red/20">
                        Create Account
                    </button>

                    <!-- Socials Minimal -->
                    <button type="button"
                        class="w-full h-12 border border-brand-border hover:border-brand-text text-brand-muted hover:text-brand-text flex items-center justify-center gap-2 transition-all mt-4">
                        <ion-icon name="logo-google" class="text-lg"></ion-icon> <span
                            class="text-xs uppercase tracking-wider">Sign up with Google</span>
                    </button>

                    <!-- Login Link Below CTA -->
                    <div class="text-center pt-4">
                        <p class="text-sm text-brand-muted">
                            Already a member? 
                            <a href="login.html" class="text-brand-red font-bold hover:text-brand-text transition-colors uppercase tracking-widest ml-1">Log In</a>
                        </p>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Password visibility toggle
        document.getElementById('toggle-password')?.addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('ion-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.setAttribute('name', 'eye-off-outline');
            } else {
                passwordInput.type = 'password';
                icon.setAttribute('name', 'eye-outline');
            }
        });
    </script>
</body>

</html>
